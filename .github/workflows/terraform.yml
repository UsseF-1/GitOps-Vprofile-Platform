name: Vprofile IAC

# Triggers on push to 'main' or 'staging' branch,
# but only when files inside the terraform/ folder change.
on:
  push:
    branches:
      - main
      - staging
    paths:
      - terraform/**
  pull_request:
    branches:
      - main
    paths:
      - terraform/**

env:
  # AWS region for all Terraform operations
  AWS_REGION: us-east-2
  # The S3 bucket that stores the Terraform remote state file
  BUCKET_TF_STATE: ${{ secrets.BUCKET_TF_STATE }}

jobs:
  terraform:
    name: "Apply Terraform Code Changes"
    runs-on: ubuntu-latest

    # Use the GitHub OIDC token for step outputs
    defaults:
      run:
        shell: bash
        working-directory: ./terraform

    steps:
      # ──────────────────────────────────────────
      # Step 1: Checkout the repository source code
      # ──────────────────────────────────────────
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # ──────────────────────────────────────────
      # Step 2: Configure AWS credentials from GitHub Secrets
      # ──────────────────────────────────────────
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ──────────────────────────────────────────
      # Step 3: Install the specified version of Terraform
      # ──────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.3

      # ──────────────────────────────────────────
      # Step 4: Initialize Terraform and configure remote backend (S3)
      # ──────────────────────────────────────────
      - name: Terraform Init
        id: init
        run: terraform init -backend-config="bucket=$BUCKET_TF_STATE"

      # ──────────────────────────────────────────
      # Step 5: Validate Terraform HCL formatting
      # ──────────────────────────────────────────
      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check
        continue-on-error: true

      # ──────────────────────────────────────────
      # Step 6: Validate Terraform syntax and configuration
      # ──────────────────────────────────────────
      - name: Terraform Validate
        id: validate
        run: terraform validate

      # ──────────────────────────────────────────
      # Step 7: Generate execution plan (dry run)
      # Only runs on staging branch or PRs against main
      # ──────────────────────────────────────────
      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false -out planfile
        continue-on-error: true

      # ──────────────────────────────────────────
      # Step 8: Fail the workflow if Plan returned an error
      # This uses the step ID to check the exit status
      # ──────────────────────────────────────────
      - name: Terraform Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      # ──────────────────────────────────────────
      # Step 9: Apply changes — ONLY on pushes to main branch
      # Staging branch stops at Plan; main branch applies
      # ──────────────────────────────────────────
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve -input=false -parallelism=1 planfile

      # ──────────────────────────────────────────
      # Step 10: Install kubectl and deploy NGINX Ingress Controller
      # Only runs after a successful apply on main
      # ──────────────────────────────────────────
      - name: Install kubectl
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.28.0"

      - name: Update kubeconfig for EKS
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name vprofile-eks

      - name: Deploy NGINX Ingress Controller
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.8.2/deploy/static/provider/aws/deploy.yaml

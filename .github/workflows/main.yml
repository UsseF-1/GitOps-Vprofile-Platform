name: GitOps Action

on: 
  push:
    branches:
      - main

jobs:
  
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run Unit Tests
        run: mvn clean test

      # - name: Run Checkstyle
      #   run: mvn checkstyle:checkstyle

  build_and_scan:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Build app Image
        run: docker build -t vproapp:latest -f docker/app/Dockerfile .

      - name: Build db Image
        run: docker build -t vprodb:latest ./docker/db/

      - name: Build web Image
        run: docker build -t vproweb:latest ./docker/web/

      - name: Scan app image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: vproapp:latest
          scan-type: image
          severity: 'CRITICAL,HIGH'
          exit-code: "0"
          format: table

      - name: Scan db image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: vprodb:latest
          scan-type: image
          severity: 'CRITICAL,HIGH'
          exit-code: "0"
          format: table

      - name: Scan web image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: vproweb:latest
          scan-type: image
          severity: 'CRITICAL,HIGH'
          exit-code: "0"
          format: table 

  push:
    runs-on: ubuntu-latest
    needs: build_and_scan

    steps:
    - name: Code checkout
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build App Image
      run: docker build -t vproapp:latest -f docker/app/Dockerfile .

    - name: Build DB Image
      run: docker build -t vprodb:latest ./docker/db/

    - name: Build Web Image
      run: docker build -t vproweb:latest ./docker/web/

    - name: Tag Images
      run: |

        docker tag vproapp:latest 996818459618.dkr.ecr.us-east-1.amazonaws.com/vprofile-app:${{ github.sha }}
        docker tag vproapp:latest 996818459618.dkr.ecr.us-east-1.amazonaws.com/vprofile-app:latest

        docker tag vprodb:latest 996818459618.dkr.ecr.us-east-1.amazonaws.com/vprofile-db:${{ github.sha }}
        docker tag vprodb:latest 996818459618.dkr.ecr.us-east-1.amazonaws.com/vprofile-db:latest

        docker tag vproweb:latest 996818459618.dkr.ecr.us-east-1.amazonaws.com/vprofile-web:${{ github.sha }}
        docker tag vproweb:latest 996818459618.dkr.ecr.us-east-1.amazonaws.com/vprofile-web:latest

    - name: Push App Images
      run: |
        docker push 996818459618.dkr.ecr.us-east-1.amazonaws.com/vprofile-app:${{ github.sha }}
        docker push 996818459618.dkr.ecr.us-east-1.amazonaws.com/vprofile-app:latest

    - name: Push DB Images
      run: |
        docker push 996818459618.dkr.ecr.us-east-1.amazonaws.com/vprofile-db:${{ github.sha }}
        docker push 996818459618.dkr.ecr.us-east-1.amazonaws.com/vprofile-db:latest

    - name: Push Web Images
      run: |
        docker push 996818459618.dkr.ecr.us-east-1.amazonaws.com/vprofile-web:${{ github.sha }}
        docker push 996818459618.dkr.ecr.us-east-1.amazonaws.com/vprofile-web:latest

  deploy:
    runs-on: ubuntu-latest
    needs: push

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region us-east-1 \
            --name GitOps_eks

      - name: Deploy with Helm
        run: |
          helm upgrade --install vprofile ./helm/vprofile \
          --set app.image.tag=${{ github.sha }} \
          --set db.image.tag=${{ github.sha }} \
          --set web.image.tag=${{ github.sha }} \
          --wait
name: GitOps Action

on: 
  push:
    branches:
      - main

jobs:
  
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run Unit Tests
        run: mvn clean test

      # - name: Run Checkstyle
      #   run: mvn checkstyle:checkstyle

  build_and_scan:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Build app Image
        run: docker build -t vproapp:latest -f docker/app/Dockerfile .

      - name: Build db Image
        run: docker build -t vprodb:latest ./docker/db/

      - name: Build web Image
        run: docker build -t vproweb:latest ./docker/web/

      - name: Scan app image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: vproapp:latest
          scan-type: image
          severity: 'CRITICAL,HIGH'
          exit-code: "1"
          format: table

      - name: Scan db image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: vprodb:latest
          scan-type: image
          severity: 'CRITICAL,HIGH'
          exit-code: "1"
          format: table

      - name: Scan web image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: vproweb:latest
          scan-type: image
          severity: 'CRITICAL,HIGH'
          exit-code: "1"
          format: table 

  push:
    runs-on: ubuntu-latest
    needs: build_and_scan

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

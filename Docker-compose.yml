services:
  vprodb:
    build:
      context: ./docker/db

    image: vprocontainers/vprofiledb:latest

    container_name: vprodb

    ports:
      - "3306:3306"
    volumes:
      - vprodbdata:/var/lib/mysql

    environment:
      - MYSQL_ROOT_PASSWORD=vprodbpass

  vprocache01:
    image: memcached:latest

    container_name: vprocache01

    ports:
      - "11211:11211"

  vpromq01:
    image: rabbitmq:latest

    container_name: vpromq01

    ports:
      - "5672:5672"

    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest

  vproapp:
    build:
      context: ./docker/app
      
    image: vprocontainers/vprofileapp:latest
    
    container_name: vproapp

    ports:
      - "8080:8080"

    volumes:
      - vproappdata:/usr/local/tomcat/webapps

  vproweb:
    build:
      context: ./docker/web

    image: vprocontainers/vprofileweb:latest

    container_name: vproweb

    ports:
      - "80:80"

volumes:
  vprodbdata: {}
  vproappdata: {}

# ──────────────────────────────────────────────────────────────────
# kubernetes/vproapp-deployment.yml
# Standalone Kubernetes Deployment (used without Helm for reference).
# In the GitOps pipeline, this is managed via the Helm chart instead.
# ──────────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: vproapp
  namespace: default
  labels:
    app: vpro-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vpro-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: vpro-app
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: vproapp
          # Replace with your ECR URI — managed dynamically by Helm in CI/CD
          image: <YOUR_ECR_URI>/vprofileapp:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

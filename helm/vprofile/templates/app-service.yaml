apiVersion: v1
kind: Service
metadata:
  # Name must stay "vproapp-service" — referenced by the Ingress backend
  name: vproapp-service
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "vprofile.labels" . | nindent 4 }}
spec:
  type: {{ .Values.app.service.type }}
  selector:
    {{- include "vprofile.selectorLabels" (dict "root" . "component" "app") | nindent 4 }}
  ports:
    - port: {{ .Values.app.service.port }}
      targetPort: vproapp-port
      protocol: TCP

apiVersion: v1
kind: Service
metadata:
  # Name must stay "vprodb" — the app initContainer resolves this DNS name
  name: vprodb
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "vprofile.labels" . | nindent 4 }}
spec:
  type: {{ .Values.db.service.type }}
  selector:
    {{- include "vprofile.selectorLabels" (dict "root" . "component" "db") | nindent 4 }}
  ports:
    - port: {{ .Values.db.service.port }}
      targetPort: vprodb-port
      protocol: TCP

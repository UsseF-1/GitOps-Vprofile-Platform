apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "vprofile.labels" . | nindent 4 }}
type: Opaque
data:
  # Pass real values at install time:
  # --set secrets.dbPassword=$(echo -n "yourpass" | base64)
  db-pass: {{ .Values.secrets.dbPassword }}
  rmq-pass: {{ .Values.secrets.rmqPassword }}

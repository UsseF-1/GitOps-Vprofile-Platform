# ──────────────────────────────────────────────────────────────────
# values.yaml — Default values for the Vprofile Helm chart.
#
# These defaults are OVERRIDDEN at deploy time by the GitHub Actions
# workflow using --set or the 'values' parameter in the deploy action.
#
# Runtime override example:
#   appimage=<ECR_URI>/vprofileapp
#   apptag=42  (GitHub run number)
# ──────────────────────────────────────────────────────────────────

# ── Application Image ─────────────────────────────────────────────
# Overridden by the CI/CD pipeline with the full ECR image URI
appimage: "nginx"         # Placeholder — replaced by CI/CD pipeline
apptag: "latest"          # Placeholder — replaced with github.run_number

# ── Replica Count ─────────────────────────────────────────────────
replicaCount: 1

# ── Service Configuration ─────────────────────────────────────────
service:
  type: ClusterIP           # Internal only — exposed via NGINX Ingress
  port: 8080
  targetPort: 8080

# ── Ingress Configuration ─────────────────────────────────────────
ingress:
  enabled: true
  className: "nginx"
  host: "vprofile.yourdomain.com"   # Replace with your actual domain
  serviceName: "my-app"
  servicePort: 8080

# ── Resource Requests and Limits ──────────────────────────────────
resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

# ── Image Pull Secret ─────────────────────────────────────────────
# The 'regcred' secret is created by the workflow before helm deploy
imagePullSecrets:
  - name: regcred

# ── Pod Labels ────────────────────────────────────────────────────
podLabels:
  app: vpro-app
  tier: application

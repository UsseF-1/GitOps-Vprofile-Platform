# =============================================================================
# configs/sonar-project.properties
#
# SonarCloud project configuration.
# The sensitive values (sonar.login, sonar.organization, sonar.projectKey)
# are passed at runtime from GitHub Secrets — do NOT hardcode them here.
#
# This file is provided as a reference. The actual sonar-scanner CLI
# invocation in the GitHub Actions workflow passes all values as flags.
# =============================================================================

# URL of the SonarCloud server
sonar.host.url=https://sonarcloud.io

# Source code directory to scan
sonar.sources=src/

# Binaries compiled from the source (required for Java analysis)
sonar.java.binaries=target/test-classes/com/visualpathit/account/controllerTest/

# Path to JUnit test reports (generated by 'mvn test')
sonar.junit.reportsPath=target/surefire-reports/

# Path to JaCoCo code coverage report (generated by 'mvn test')
sonar.jacoco.reportsPath=target/jacoco.exec

# Path to Checkstyle XML report (generated by 'mvn checkstyle:checkstyle')
sonar.java.checkstyle.reportPaths=target/checkstyle-result.xml

# Language being analysed
sonar.language=java

# Encoding of source files
sonar.sourceEncoding=UTF-8
